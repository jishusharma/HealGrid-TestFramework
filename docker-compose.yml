services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # allow Jenkins to run Docker commands
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    networks:
      - healenium

  postgres-db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=healenium
      - POSTGRES_USER=healenium_user
      - POSTGRES_PASSWORD=healenium_password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U healenium_user -d healenium && psql -U healenium_user -d healenium -c 'SELECT schema_name FROM information_schema.schemata' | grep -q healenium" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - healenium

  healenium:
    image: healenium/hlm-backend:3.3.0
    ports:
      - "7878:7878"
    depends_on:
      postgres-db:
        condition: service_healthy
    links:
      - postgres-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/healenium
      - SPRING_DATASOURCE_USERNAME=healenium_user
      - SPRING_DATASOURCE_PASSWORD=healenium_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_LIQUIBASE_DEFAULT_SCHEMA=healenium
      - HLM_LOG_LEVEL=info
      - COLLECT_METRICS=true
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7878/healenium/report" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - healenium

  selector-imitator:
    image: healenium/hlm-selector-imitator:1.1
    ports:
      - "8000:8000"
    networks:
      - healenium

  test-runner:
    build: .
    depends_on:
      healenium:
        condition: service_healthy
      selector-imitator:
        condition: service_started
      selenium-hub:
        condition: service_healthy
    volumes:
      - ./target/allure-results:/app/target/allure-results
      - ./target/surefire-reports:/app/target/surefire-reports
      - ./logs:/app/logs
    networks:
      - healenium

  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:4444/status" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - healenium

  chrome:
    image: selenium/node-chrome:4.21.0
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - healenium

  firefox:
    image: selenium/node-firefox:4.21.0
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - healenium

networks:
  healenium:
    driver: bridge

volumes:
  jenkins_home:
